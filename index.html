<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreaMov</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="content-wrapper"> <!-- Header Section -->
    <header>
        <div class="content-wrapper">
            <div class="container">
                <h1>GreaMov</h1>
                <nav>
                    <a href="#home">Home</a>
                    <a href="#Netflix">Netflix</a>
                    <a href="#Series">Series</a>
                    <div class="dropdown">
                        <a href="#Genre" class="dropbtn">Genre</a>
                        <div class="dropdown-content">
                            <a href="#Action">Action</a>
                            <a href="#Comedy">Comedy</a>
                            <a href="#Drama">Drama</a>
                            <a href="#Sci-Fi">Sci-Fi</a>
                        </div>
                    </div>
                    <div class="dropdown">
                        <a href="#page4" class="dropbtn">Page 4</a>
                        <div class="dropdown-content">
                            <a href="#Subpage1">Subpage 1</a>
                            <a href="#Subpage2">Subpage 2</a>
                            <a href="#Subpage3">Subpage 3</a>
                        </div>
                    </div>
                </nav>
            </div>
    </header>

    <div class="horizontal-scroll">
        <div class="poster-container">
            <!-- Poster items will be dynamically added here by JavaScript -->
        </div>
    </div>

    <div class="content-wrapper">
        <div class="container gallery">
            <h2>Trending Movies</h2>
            <div class="grid" id="trendingMovies">
                <!-- Trending movie posters will be dynamically added here by JavaScript -->
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="container gallery">
            <h4>Series</h4>
            <div class="grid" id="series">
                <!-- Series posters will be dynamically added here by JavaScript -->
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="container gallery">
            <h5>Adrenalin</h5>
            <div class="grid" id="adrenalin">
                <!-- Adrenalin movie posters will be dynamically added here by JavaScript -->
            </div>
        </div>
    </div>
</div>
            
             
    <!-- Footer -->
    <footer>
        <p>&copy; 2024 TelegramMovie. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
